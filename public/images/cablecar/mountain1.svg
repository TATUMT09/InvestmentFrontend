<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="60%" style="stop-color:#5b8fc2"/>
      <stop offset="100%" style="stop-color:#a8c8e8"/>
    </linearGradient>
    <linearGradient id="snow1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#c8dce8"/>
    </linearGradient>
    <linearGradient id="snow2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0f8"/>
      <stop offset="100%" style="stop-color:#9ab8cc"/>
    </linearGradient>
    <linearGradient id="rock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7a8a"/>
      <stop offset="100%" style="stop-color:#3d4a55"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="500" fill="url(#sky)"/>

  <!-- Clouds -->
  <ellipse cx="150" cy="80" rx="80" ry="25" fill="white" fill-opacity="0.7"/>
  <ellipse cx="200" cy="70" rx="60" ry="20" fill="white" fill-opacity="0.6"/>
  <ellipse cx="600" cy="60" rx="90" ry="22" fill="white" fill-opacity="0.5"/>
  <ellipse cx="660" cy="50" rx="70" ry="18" fill="white" fill-opacity="0.6"/>

  <!-- Far mountains (background) -->
  <polygon points="0,320 120,140 240,300 350,120 480,280 600,100 720,260 800,150 800,500 0,500" fill="#7a9bb5" fill-opacity="0.5"/>
  <!-- Snow caps far -->
  <polygon points="350,120 320,170 380,170" fill="white" fill-opacity="0.8"/>
  <polygon points="600,100 565,160 635,160" fill="white" fill-opacity="0.8"/>

  <!-- Mid mountains -->
  <polygon points="0,400 100,200 200,350 320,160 450,320 560,130 680,300 800,220 800,500 0,500" fill="url(#rock)"/>
  <!-- Snow on mid mountains -->
  <polygon points="320,160 290,220 350,220" fill="url(#snow1)"/>
  <polygon points="560,130 525,195 595,195" fill="url(#snow1)"/>
  <polygon points="100,200 80,240 120,240" fill="url(#snow2)"/>

  <!-- Foreground rocky ground -->
  <polygon points="0,420 800,380 800,500 0,500" fill="#3d4a55"/>
  <polygon points="0,440 800,400 800,500 0,500" fill="#2d3840"/>

  <!-- Cable car wire -->
  <line x1="50" y1="180" x2="750" y2="120" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Support towers -->
  <rect x="180" y="200" width="8" height="80" fill="#2d3840"/>
  <rect x="176" y="195" width="16" height="8" rx="2" fill="#1a2530"/>
  <rect x="500" y="160" width="8" height="90" fill="#2d3840"/>
  <rect x="496" y="155" width="16" height="8" rx="2" fill="#1a2530"/>

  <!-- Cable car gondola -->
  <g transform="translate(330, 125)">
    <!-- Hanger -->
    <line x1="20" y1="-8" x2="20" y2="0" stroke="#333" stroke-width="2"/>
    <circle cx="20" cy="-10" r="4" fill="#555"/>
    <!-- Car body -->
    <rect x="0" y="0" width="40" height="28" rx="4" fill="#c8102e"/>
    <!-- Windows -->
    <rect x="5" y="5" width="12" height="10" rx="2" fill="#a8d8f0" fill-opacity="0.8"/>
    <rect x="23" y="5" width="12" height="10" rx="2" fill="#a8d8f0" fill-opacity="0.8"/>
    <!-- Bottom -->
    <rect x="4" y="22" width="32" height="6" rx="2" fill="#9e0c26"/>
  </g>

  <!-- Another gondola far -->
  <g transform="translate(560, 112)">
    <line x1="18" y1="-8" x2="18" y2="0" stroke="#333" stroke-width="2"/>
    <circle cx="18" cy="-10" r="3" fill="#555"/>
    <rect x="0" y="0" width="36" height="25" rx="4" fill="#c8102e"/>
    <rect x="4" y="4" width="10" height="9" rx="2" fill="#a8d8f0" fill-opacity="0.7"/>
    <rect x="20" y="4" width="10" height="9" rx="2" fill="#a8d8f0" fill-opacity="0.7"/>
    <rect x="3" y="19" width="30" height="6" rx="2" fill="#9e0c26"/>
  </g>

  <!-- Label -->
  <rect x="200" y="448" width="400" height="42" rx="12" fill="#0f172a" fill-opacity="0.75"/>
  <text x="400" y="464" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">TOG' MANZARASI</text>
  <text x="400" y="482" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">🚡 Kanat yo'li loyihasi</text>
</svg>
