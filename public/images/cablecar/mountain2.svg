<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c4a6e"/>
      <stop offset="100%" style="stop-color:#7aabce"/>
    </linearGradient>
    <linearGradient id="gondola" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4edff"/>
      <stop offset="100%" style="stop-color:#8fc0e0"/>
    </linearGradient>
  </defs>

  <!-- Sky gradient -->
  <rect width="800" height="500" fill="url(#sky2)"/>

  <!-- Clouds -->
  <ellipse cx="100" cy="90" rx="70" ry="22" fill="white" fill-opacity="0.5"/>
  <ellipse cx="140" cy="80" rx="55" ry="18" fill="white" fill-opacity="0.6"/>
  <ellipse cx="680" cy="70" rx="80" ry="20" fill="white" fill-opacity="0.5"/>

  <!-- Distant snowy mountains -->
  <polygon points="-20,350 80,160 180,320 290,100 420,300 540,80 680,280 800,140 800,500 -20,500"
    fill="#8aacbc" fill-opacity="0.6"/>
  <polygon points="290,100 260,170 320,170" fill="white" fill-opacity="0.9"/>
  <polygon points="540,80 505,155 575,155" fill="white" fill-opacity="0.9"/>

  <!-- Main mountain (close, right side) -->
  <polygon points="400,500 500,200 600,500" fill="#4a5e6b"/>
  <polygon points="500,200 475,260 525,260" fill="white"/>

  <!-- Rocky cliff face (left) -->
  <polygon points="0,500 0,250 100,180 200,280 250,500" fill="#3a4a55"/>
  <polygon points="100,180 85,230 115,230" fill="#e8eff5"/>

  <!-- Snow ground foreground -->
  <ellipse cx="400" cy="490" rx="450" ry="60" fill="white" fill-opacity="0.3"/>
  <rect x="0" y="460" width="800" height="40" fill="white" fill-opacity="0.4"/>

  <!-- Cable wires (perspective) -->
  <line x1="60" y1="200" x2="740" y2="150" stroke="#222" stroke-width="3"/>
  <line x1="60" y1="208" x2="740" y2="158" stroke="#333" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Pole left -->
  <rect x="55" y="200" width="10" height="120" fill="#2a3540"/>
  <rect x="50" y="193" width="20" height="10" rx="2" fill="#1a252e"/>
  <!-- Pole mid -->
  <rect x="395" y="168" width="10" height="100" fill="#2a3540"/>
  <rect x="390" y="162" width="20" height="10" rx="2" fill="#1a252e"/>

  <!-- Close-up gondola (large, center-left) -->
  <g transform="translate(210, 148)">
    <!-- Suspension -->
    <line x1="30" y1="-20" x2="30" y2="0" stroke="#222" stroke-width="3"/>
    <circle cx="30" cy="-22" r="6" fill="#444"/>
    <!-- Body -->
    <rect x="0" y="0" width="60" height="42" rx="6" fill="url(#gondola)" stroke="#6a9ab8" stroke-width="1.5"/>
    <!-- Roof -->
    <rect x="2" y="0" width="56" height="8" rx="4" fill="#a0c8e0"/>
    <!-- Windows -->
    <rect x="5" y="10" width="18" height="14" rx="3" fill="#c8ecff" fill-opacity="0.9"/>
    <rect x="27" y="10" width="18" height="14" rx="3" fill="#c8ecff" fill-opacity="0.9"/>
    <!-- Reflection -->
    <rect x="6" y="11" width="5" height="6" rx="1" fill="white" fill-opacity="0.5"/>
    <rect x="28" y="11" width="5" height="6" rx="1" fill="white" fill-opacity="0.5"/>
    <!-- Base -->
    <rect x="5" y="34" width="50" height="8" rx="3" fill="#80a8c0"/>
    <!-- Branding stripe -->
    <rect x="0" y="18" width="60" height="4" fill="#1e6fa8" fill-opacity="0.4"/>
  </g>

  <!-- Far gondola -->
  <g transform="translate(600, 138)">
    <line x1="18" y1="-14" x2="18" y2="0" stroke="#222" stroke-width="2"/>
    <circle cx="18" cy="-16" r="4" fill="#444"/>
    <rect x="0" y="0" width="36" height="26" rx="4" fill="url(#gondola)" stroke="#6a9ab8" stroke-width="1"/>
    <rect x="3" y="5" width="11" height="9" rx="2" fill="#c8ecff" fill-opacity="0.85"/>
    <rect x="18" y="5" width="11" height="9" rx="2" fill="#c8ecff" fill-opacity="0.85"/>
    <rect x="3" y="20" width="30" height="6" rx="2" fill="#80a8c0"/>
  </g>

  <!-- Label -->
  <rect x="200" y="448" width="400" height="42" rx="12" fill="#0f172a" fill-opacity="0.75"/>
  <text x="400" y="464" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">KANAT YO'LI KABINASI</text>
  <text x="400" y="482" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">🏔️ Qor qoplagan tog' yo'li</text>
</svg>
