<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="60%" style="stop-color:#bfdbfe"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#166534"/>
    </linearGradient>
  </defs>
  <!-- sky -->
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- ground -->
  <rect y="280" width="800" height="220" fill="url(#ground)"/>

  <!-- main greenhouse building -->
  <rect x="120" y="200" width="500" height="140" rx="4" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- roof panels -->
  <rect x="120" y="200" width="100" height="140" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="220" y="200" width="100" height="140" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="320" y="200" width="100" height="140" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="420" y="200" width="100" height="140" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.5"/>
  <rect x="520" y="200" width="100" height="140" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.5"/>
  <!-- glass reflection lines -->
  <line x1="140" y1="200" x2="140" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="160" y1="200" x2="160" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="240" y1="200" x2="240" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="260" y1="200" x2="260" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="340" y1="200" x2="340" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="360" y1="200" x2="360" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="440" y1="200" x2="440" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="460" y1="200" x2="460" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="540" y1="200" x2="540" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <line x1="560" y1="200" x2="560" y2="340" stroke="#93c5fd" stroke-opacity="0.4" stroke-width="1"/>
  <!-- admin building -->
  <rect x="650" y="230" width="100" height="80" rx="3" fill="#475569"/>
  <rect x="660" y="240" width="35" height="25" fill="#93c5fd" fill-opacity="0.6"/>
  <rect x="705" y="240" width="35" height="25" fill="#93c5fd" fill-opacity="0.6"/>
  <!-- road -->
  <rect x="0" y="350" width="800" height="30" fill="#64748b" fill-opacity="0.5"/>
  <line x1="0" y1="365" x2="800" y2="365" stroke="white" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="30 20"/>
  <!-- trees -->
  <circle cx="80"  cy="310" r="25" fill="#16a34a"/>
  <circle cx="720" cy="310" r="25" fill="#16a34a"/>
  <circle cx="50"  cy="330" r="18" fill="#15803d"/>
  <circle cx="750" cy="330" r="18" fill="#15803d"/>
  <!-- label -->
  <rect x="200" y="390" width="400" height="50" rx="12" fill="#0f172a" fill-opacity="0.6"/>
  <text x="400" y="410" font-family="sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">AERIAL VIEW</text>
  <text x="400" y="430" font-family="sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">Gidroponika issiqxona majmuasi</text>
</svg>
