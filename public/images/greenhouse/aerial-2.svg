<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7dd3fc"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="roof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#sky2)"/>
  <!-- terrain / grass -->
  <ellipse cx="400" cy="500" rx="600" ry="200" fill="#4ade80" fill-opacity="0.4"/>
  <rect y="380" width="800" height="120" fill="#16a34a" fill-opacity="0.5"/>

  <!-- large greenhouse complex - perspective view -->
  <!-- Building 1 (front-left) -->
  <rect x="80" y="220" width="280" height="160" rx="5" fill="url(#roof)" stroke="#94a3b8" stroke-width="2"/>
  <line x1="80"  y1="220" x2="80"  y2="380" stroke="#64748b" stroke-width="1"/>
  <line x1="150" y1="220" x2="150" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="220" y1="220" x2="220" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="290" y1="220" x2="290" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="80"  y1="280" x2="360" y2="280" stroke="#64748b" stroke-width="0.5"/>
  <line x1="80"  y1="340" x2="360" y2="340" stroke="#64748b" stroke-width="0.5"/>
  <!-- glass shine -->
  <rect x="82"  y="222" width="65" height="55" fill="#bfdbfe" fill-opacity="0.3"/>
  <rect x="152" y="222" width="65" height="55" fill="#bfdbfe" fill-opacity="0.15"/>

  <!-- Building 2 (front-right) -->
  <rect x="440" y="220" width="280" height="160" rx="5" fill="url(#roof)" stroke="#94a3b8" stroke-width="2"/>
  <line x1="440" y1="220" x2="440" y2="380" stroke="#64748b" stroke-width="1"/>
  <line x1="510" y1="220" x2="510" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="580" y1="220" x2="580" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="650" y1="220" x2="650" y2="380" stroke="#64748b" stroke-width="0.5"/>
  <line x1="440" y1="280" x2="720" y2="280" stroke="#64748b" stroke-width="0.5"/>
  <line x1="440" y1="340" x2="720" y2="340" stroke="#64748b" stroke-width="0.5"/>
  <rect x="442" y="222" width="65" height="55" fill="#bfdbfe" fill-opacity="0.3"/>

  <!-- Connection/path between buildings -->
  <rect x="360" y="280" width="80" height="60" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>

  <!-- Admin block -->
  <rect x="340" y="150" width="120" height="70" rx="4" fill="#334155"/>
  <rect x="350" y="158" width="40" height="30" fill="#7dd3fc" fill-opacity="0.5"/>
  <rect x="400" y="158" width="40" height="30" fill="#7dd3fc" fill-opacity="0.5"/>

  <!-- Road -->
  <rect x="0" y="400" width="800" height="40" fill="#475569" fill-opacity="0.6"/>
  <line x1="0" y1="420" x2="800" y2="420" stroke="white" stroke-opacity="0.3" stroke-dasharray="40 20" stroke-width="2"/>
  <!-- trucks -->
  <rect x="100" y="400" width="55" height="25" rx="3" fill="#1e293b"/>
  <rect x="600" y="400" width="55" height="25" rx="3" fill="#1e293b"/>

  <!-- trees border -->
  <circle cx="30"  cy="380" r="22" fill="#15803d"/>
  <circle cx="770" cy="380" r="22" fill="#15803d"/>
  <circle cx="30"  cy="360" r="16" fill="#16a34a"/>
  <circle cx="770" cy="360" r="16" fill="#16a34a"/>

  <!-- label -->
  <rect x="220" y="450" width="360" height="40" rx="12" fill="#0f172a" fill-opacity="0.65"/>
  <text x="400" y="466" font-family="sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">RENDER — LOYIHA REJASI</text>
  <text x="400" y="483" font-family="sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">🏗️ Issiqxona majmuasi (9 ga)</text>
</svg>
